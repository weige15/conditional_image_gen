paths:
  train_csv: dataset/train.csv
  train_image_dir: dataset/trainset
  generate_csv: dataset/generate.csv
  output_dir: generated_images
  checkpoint_dir: checkpoints
  reference_dir: hw6_reference

data:
  image_size: 64
  random_horizontal_flip: false
  num_workers: 2

model:
  image_channels: 3
  base_channels: 96
  channel_mults: [1, 2, 2, 4]
  blocks_per_level: 2
  dropout: 0.1
  attention_resolutions: [16]

diffusion:
  timesteps: 1000
  beta_schedule: cosine

optimizer:
  lr: 0.0002
  weight_decay: 0.01
  batch_size: 64
  gradient_accumulation_steps: 1
  max_steps: 100000
  mixed_precision: false

ema:
  decay: 0.9999

training:
  seed: 1234
  condition_dropout: 0.1
  log_every: 50
  save_every: 1000
  resume: null

sampling:
  sampler: ddim
  batch_size: 64
  steps: 100
  eta: 0.0
  guidance_scale: 1.5
  seed: 1234
  use_ema: true
